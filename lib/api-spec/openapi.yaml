openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: beaches
    description: Beach catalogue and surf reports
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /beaches:
    get:
      operationId: listBeaches
      tags: [beaches]
      summary: List all beaches
      description: Returns the catalogue of Sydney surf beaches
      responses:
        "200":
          description: Beach list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeachListResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Region:
      type: string
      enum:
        - northern-beaches
        - eastern-suburbs
        - cronulla
      description: Sydney coastal region grouping
    FacingDirection:
      type: string
      enum:
        - N
        - NE
        - E
        - SE
        - S
      description: Compass direction the beach faces (open ocean side)
    Beach:
      type: object
      properties:
        id:
          type: string
          description: Stable slug, e.g. "bondi"
        name:
          type: string
        region:
          $ref: "#/components/schemas/Region"
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        facingDirection:
          $ref: "#/components/schemas/FacingDirection"
        description:
          type: string
        heroImageUrl:
          type: string
          description: Relative path to the beach hero image
      required:
        - id
        - name
        - region
        - latitude
        - longitude
        - facingDirection
        - description
        - heroImageUrl
    BeachListResponse:
      type: object
      properties:
        beaches:
          type: array
          items:
            $ref: "#/components/schemas/Beach"
        count:
          type: integer
      required:
        - beaches
        - count
