openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: beaches
    description: Beach catalogue and surf reports
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /beaches:
    get:
      operationId: listBeaches
      tags: [beaches]
      summary: List all beaches
      description: Returns the catalogue of Sydney surf beaches
      responses:
        "200":
          description: Beach list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeachListResponse"
  /beaches/{beachId}/report:
    get:
      operationId: getBeachReport
      tags: [beaches]
      summary: Get the latest surf, weather, and tide report for a beach
      description: Returns cached Open-Meteo Marine + Weather data and a 1-10 surf score. Cache TTL is 30 minutes.
      parameters:
        - name: beachId
          in: path
          required: true
          schema:
            type: string
          description: Beach slug
      responses:
        "200":
          description: Surf report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurfReport"
        "404":
          description: Beach not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Region:
      type: string
      enum:
        - northern-beaches
        - eastern-suburbs
        - cronulla
      description: Sydney coastal region grouping
    FacingDirection:
      type: string
      enum:
        - N
        - NE
        - E
        - SE
        - S
      description: Compass direction the beach faces (open ocean side)
    Beach:
      type: object
      properties:
        id:
          type: string
          description: Stable slug, e.g. "bondi"
        name:
          type: string
        region:
          $ref: "#/components/schemas/Region"
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        facingDirection:
          $ref: "#/components/schemas/FacingDirection"
        description:
          type: string
        heroImageUrl:
          type: string
          description: Relative path to the beach hero image
        latestScore:
          type: integer
          minimum: 1
          maximum: 10
          nullable: true
          description: Most recent cached surf score, or null if no report has been fetched yet
        latestScoreLabel:
          allOf:
            - $ref: "#/components/schemas/SurfScoreLabel"
          nullable: true
        latestReportFetchedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - region
        - latitude
        - longitude
        - facingDirection
        - description
        - heroImageUrl
    BeachListResponse:
      type: object
      properties:
        beaches:
          type: array
          items:
            $ref: "#/components/schemas/Beach"
        count:
          type: integer
      required:
        - beaches
        - count
    SurfScoreLabel:
      type: string
      enum:
        - Flat
        - Poor
        - Fair
        - Good
        - Epic
      description: Human-readable label derived from the numeric score
    SurfReport:
      type: object
      properties:
        beachId:
          type: string
        score:
          type: integer
          minimum: 1
          maximum: 10
          description: Overall surf score for this beach right now
        scoreLabel:
          $ref: "#/components/schemas/SurfScoreLabel"
        waveHeightM:
          type: number
          format: double
          description: Significant wave height in metres
        wavePeriodS:
          type: number
          format: double
          description: Wave period in seconds
        waveDirectionDeg:
          type: number
          format: double
          description: Direction waves are coming from, degrees from north
        windSpeedKmh:
          type: number
          format: double
        windDirectionDeg:
          type: number
          format: double
          description: Direction wind is coming from, degrees from north
        windRelative:
          type: string
          enum:
            - offshore
            - cross-shore
            - onshore
          description: Wind direction relative to the beach facing
        airTemperatureC:
          type: number
          format: double
          nullable: true
        waterTemperatureC:
          type: number
          format: double
          nullable: true
        seaLevelM:
          type: number
          format: double
          nullable: true
          description: Sea surface height above mean sea level (proxy for tide)
        fetchedAt:
          type: string
          format: date-time
          description: When the upstream data was fetched
        cached:
          type: boolean
          description: True if the response was served from cache
      required:
        - beachId
        - score
        - scoreLabel
        - waveHeightM
        - wavePeriodS
        - waveDirectionDeg
        - windSpeedKmh
        - windDirectionDeg
        - windRelative
        - fetchedAt
        - cached
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
